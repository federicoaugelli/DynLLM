# ============================================================
# DynLLM configuration example
# Copy to config.yaml and edit to match your setup.
# ============================================================

# ------------------------------------
# HTTP server settings
# ------------------------------------
server:
  host: "0.0.0.0"   # bind address
  port: 8000         # listen port

# ------------------------------------
# GPU VRAM budget (megabytes)
# ------------------------------------
# The proxy will not exceed this when deciding what to load.
# Set this to your GPU's usable VRAM (e.g. leave ~500 MB headroom
# for the driver and other processes).
total_vram_mb: 7500

# ------------------------------------
# Idle auto-unload timeout (seconds)
# ------------------------------------
# A loaded model that receives no requests for this duration is
# automatically unloaded to free VRAM.
idle_timeout_seconds: 300

# ------------------------------------
# Backends
# ------------------------------------
# Uncomment only the backends you have installed.
enabled_backends:
  - llamacpp           # serves GGUF models via llama-server
  - openvino           # serves OpenVINO IR models via OVMS
  # - tts             # in-process TTS engines (Qwen, Supertonic, …)
  # - privacy_filter  # in-process PII masking via openai/privacy-filter (HF)

# Backend binary configuration
backend:
  llamacpp_binary: "llama-server"   # or /full/path/to/llama-server
  ovms_binary: "ovms"               # or /full/path/to/ovms
  # Port range allocated to backend subprocesses (one port per loaded model)
  port_range_start: 9100
  port_range_end: 9200

# ------------------------------------
# Optional: base directory for models
# ------------------------------------
# If set, relative 'path' values in the models list are resolved
# relative to this directory.
# models_dir: /mnt/models

# ------------------------------------
# State database
# ------------------------------------
db_path: dynllm_state.db

# ------------------------------------
# Logging
# ------------------------------------
log_level: "info"   # debug | info | warning | error

# ------------------------------------
# Startup preload
# ------------------------------------
# Models listed here are loaded automatically when DynLLM starts.
# Each entry must match a 'name' in the models list below.
# Normal VRAM eviction rules apply.
# preload_models:
#   - "llama3-8b-q4"

# ------------------------------------
# Model declarations
# ------------------------------------
# Each model has:
#   name         – unique ID used in API requests (model field)
#   path         – file (.gguf) or directory (OpenVINO IR) on disk
#   backend      – "llamacpp", "openvino", "transformers", or "tts"
#   model_type   – "llm", "transcription", "speech",
#                  "embedding", "rerank", "classification",
#                  "detection", "segmentation", "ocr",
#                  "image_generation"
#   vram_mb      – estimated VRAM when loaded (used for eviction decisions)
#   target_device – OpenVINO target device (CPU/GPU/NPU); defaults to CPU
#
# llama.cpp extra fields:
#   n_gpu_layers  – layers to offload to GPU (-1 = all)
#   context_size  – context window size
#
# OpenVINO extra fields:
#   ovms_shape    – optional shape hint (e.g. "auto")
#
# OpenVINO LLM extra fields (tool calling / reasoning):
#   tool_parser                   – parser for tool call extraction
#                                   (llama3, hermes3, phi4, mistral,
#                                    gptoss, qwen3coder, devstral, lfm2)
#   reasoning_parser              – parser for reasoning content extraction
#                                   (qwen3, gptoss)
#   enable_tool_guided_generation – guide the model to follow tool schema (true/false)
#
# OpenVINO LLM speculative decoding:
#   draft_model      – path to a smaller OpenVINO IR draft model directory.
#                      The draft model predicts tokens that the main model
#                      validates, speeding up inference at low concurrency.
#                      Must use the same tokenizer as the main model.
#   draft_model_vram_mb – extra VRAM consumed by the draft model (MB).
#                      Added to vram_mb for eviction decisions.
#
# OpenVINO LLM KV cache optimization:
#   kv_cache_precision  – set to "u8" for 8-bit KV cache (halves memory)
#   cache_size          – fixed KV cache size in GB (default: dynamic)
#   enable_prefix_caching – cache repeated prompt prefixes (default: true)
#
# OpenVINO LLM scheduling / batching:
#   max_num_seqs         – max sequences processed together (default: 256)
#   max_num_batched_tokens – max tokens in a single scheduler step
#   dynamic_split_fuse   – split prefill/decode across batches (default: true)
#
# OpenVINO LLM multi-device:
#   model_distribution_policy – "TENSOR_PARALLEL" or "PIPELINE_PARALLEL"
#                               for multi-socket/multi-GPU setups
#
# Transformers (Hugging Face) extra fields:
#   device                – "auto", "cpu", "cuda", "xpu" (default: auto)
#   dtype                 – "auto", "float16", "bfloat16", "float32" (default: auto)
#   quantization          – "none", "bnb-4bit", "bnb-8bit" (default: none; LLM only)
#   trust_remote_code     – allow custom HF model code (true/false, default: false)
#   compile_model         – enable torch.compile (true/false, default: false)
#   continuous_batching   – enable continuous batching (true/false, default: false)
#   attn_implementation   – "auto", "eager", "sdpa", "flash_attention_2",
#                           "flash_attention_3", "flex_attention"
#   model_timeout         – idle timeout inside the backend (seconds)
#   revision              – HF model revision (e.g. "main")
#
# Per-model idle timeout (optional):
#   unload_time   – seconds of inactivity before auto-unload.
#                   Overrides the global idle_timeout_seconds for this model.
#                   Use -1 or "inf" to never auto-unload (model stays until
#                   VRAM pressure or manual unload).

models:
  # --- llama.cpp (GGUF) example ---
  - name: "llama3-8b-q4"
    path: "/mnt/models/gguf/Meta-Llama-3-8B-Instruct.Q4_K_M.gguf"
    backend: llamacpp
    model_type: llm
    vram_mb: 5500
    n_gpu_layers: -1       # all layers on GPU
    context_size: 4096
    # unload_time: 600     # unload after 10 min idle (overrides global)

  - name: "mistral-7b-q5"
    path: "/mnt/models/gguf/Mistral-7B-Instruct-v0.3.Q5_K_M.gguf"
    backend: llamacpp
    model_type: llm
    vram_mb: 6000
    n_gpu_layers: -1
    context_size: 8192
    # unload_time: -1      # never auto-unload

  # --- OpenVINO (IR) examples ---
  - name: "phi3-mini-ov"
    path: "/mnt/models/openvino/phi-3-mini-4k-instruct-ov"
    backend: openvino
    model_type: llm
    target_device: GPU
    vram_mb: 4096
    ovms_shape: "auto"
    # unload_time: inf     # never auto-unload

  # --- OpenVINO LLM with tool calling support ---

  # GPT-OSS requires BOTH tool_parser AND reasoning_parser set to "gptoss"
  - name: "gpt-oss"
    path: "/mnt/models/openvino/gpt-oss-20b-int4-ov"
    backend: openvino
    model_type: llm
    target_device: GPU
    vram_mb: 12000
    tool_parser: gptoss
    reasoning_parser: gptoss

  # Qwen3 models typically use hermes3 tool parser (optional: + reasoning_parser qwen3)
  - name: "qwen3-4b"
    path: "/mnt/models/openvino/Qwen3-4B-int4-ov"
    backend: openvino
    model_type: llm
    target_device: GPU
    vram_mb: 4096
    tool_parser: hermes3
    reasoning_parser: qwen3

  # Phi-4-mini with tool-guided generation
  - name: "phi4-mini"
    path: "/mnt/models/openvino/Phi-4-mini-instruct-int4-ov"
    backend: openvino
    model_type: llm
    target_device: GPU
    vram_mb: 4096
    tool_parser: phi4
    enable_tool_guided_generation: true

  - name: "whisper-large-v3-ov"
    path: "/mnt/models/openvino/whisper-large-v3-ov"
    backend: openvino
    model_type: transcription
    target_device: CPU
    vram_mb: 0

  # --- TTS engines (in-process, supports GPU) ---
  # These use the 'tts' backend which loads the model in-process.
  # Each 'tts_engine' maps to a specific Python package.
  #
  #   Qwen3-TTS:
  #     uv pip install qwen-tts soundfile
  #     The 'path' is the Hugging Face model ID or local directory.
  - name: "qwen3-tts"
    path: "Qwen/Qwen3-TTS-12Hz-0.6B-Base"
    backend: tts
    model_type: speech
    tts_engine: qwen
    target_device: xpu
    vram_mb: 3000

  #   Supertonic:
  #     uv pip install supertonic soundfile
  #     'path' is ignored; models are auto-downloaded.
  - name: "supertonic"
    path: ""
    backend: tts
    model_type: speech
    tts_engine: supertonic
    target_device: xpu
    vram_mb: 2000

  # --- Privacy filter (in-process, Hugging Face token-classification) ---
  # Used by litellm's Generic Guardrail API for PII masking in prompts.
  # The model path can be a local copy or a Hugging Face model ID.
  # Requires `privacy_filter` in enabled_backends and the 'transformers'
  # + 'torch' packages installed.
  - name: "privacy-filter"
    path: "/mnt/models/privacy-filter"   # local copy of openai/privacy-filter
    backend: privacy_filter
    model_type: classification
    vram_mb: 1024
    unload_time: -1        # keep loaded (model is small and cheap)

  # --- Embedding model (llama.cpp example) ---
  - name: "bge-m3-gguf"
    path: "/mnt/models/gguf/bge-m3-Q4_K_M.gguf"
    backend: llamacpp
    model_type: embedding
    vram_mb: 1500
    n_gpu_layers: -1
    context_size: 8192

  # --- Rerank model (llama.cpp example) ---
  - name: "bge-reranker-v2-gguf"
    path: "/mnt/models/gguf/bge-reranker-v2-gemma-Q4_K_M.gguf"
    backend: llamacpp
    model_type: rerank
    vram_mb: 2000
    n_gpu_layers: -1
    context_size: 4096

  # --- CV model: classification (OpenVINO example) ---
  # Accessible via KServe API: POST /v2/models/resnet50-vm/infer
  - name: "resnet50-vm"
    path: "/mnt/models/openvino/resnet-50-vm"
    backend: openvino
    model_type: classification
    target_device: GPU
    vram_mb: 200

  # --- CV model: object detection (OpenVINO example) ---
  # Accessible via KServe API: POST /v2/models/yolov8/infer
  - name: "yolov8"
    path: "/mnt/models/openvino/yolov8"
    backend: openvino
    model_type: detection
    target_device: GPU
    vram_mb: 500

  # --- CV model: segmentation (OpenVINO example) ---
  # Accessible via KServe API: POST /v2/models/mask-rcnn/infer
  - name: "mask-rcnn"
    path: "/mnt/models/openvino/mask-rcnn"
    backend: openvino
    model_type: segmentation
    target_device: GPU
    vram_mb: 800

  # --- OCR model (OpenVINO example) ---
  # Accessible via KServe API: POST /v2/models/paddle-ocr/infer
  - name: "paddle-ocr"
    path: "/mnt/models/openvino/paddle-ocr"
    backend: openvino
    model_type: ocr
    target_device: CPU
    vram_mb: 600

  # --- Image generation model (OpenVINO example) ---
  # Accessible via OpenAI /v1/images/generations
  # Model must be exported to OpenVINO IR format (use optimum-cli or
  # download pre-converted from huggingface.co/OpenVINO)
  - name: "sd-xl-ov"
    path: "/mnt/models/openvino/stable-diffusion-xl"
    backend: openvino
    model_type: image_generation
    target_device: GPU
    vram_mb: 4096

  # --- OpenVINO LLM with speculative decoding and KV cache optimization ---
  # Uses a small draft model to speed up token generation.
  # KV cache is quantized to u8 to reduce memory.
  - name: "codellama-7b-sd"
    path: "/mnt/models/openvino/codellama-7b-instruct-ov"
    backend: openvino
    model_type: llm
    target_device: GPU
    vram_mb: 12000
    draft_model: "/mnt/models/openvino/llama-135m-draft-ov"
    draft_model_vram_mb: 500
    kv_cache_precision: u8
    cache_size: 8
    enable_prefix_caching: true
    max_num_seqs: 128
    # unload_time: 600

  # --- OpenVINO LLM with custom batching and multi-device distribution ---
  - name: "llama3-70b-ov"
    path: "/mnt/models/openvino/llama3-70b-ov"
    backend: openvino
    model_type: llm
    target_device: CPU
    vram_mb: 48000
    max_num_seqs: 256
    max_num_batched_tokens: 8192
    dynamic_split_fuse: true
    cache_size: 32
    # model_distribution_policy: TENSOR_PARALLEL   # for multi-socket

  # --- Embedding model (OpenVINO example) ---
  # Accessible via OpenAI /v1/embeddings or KServe /v2/models/bge-m3-ov/infer
  - name: "bge-m3-ov"
    path: "/mnt/models/openvino/bge-m3"
    backend: openvino
    model_type: embedding
    target_device: CPU
    vram_mb: 1000
